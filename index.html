<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThoughtNest - Journal</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="app">
    <nav>
        <div>
            ThoughtNest
        </div>
    </nav>

    <!-- 
      Main Container 
      This holds both the left column (entries) and the right column (form).
    -->
    <main class="app-container">

        <!-- LEFT COLUMN: Past Entries -->
        <div class="entries-list hide-scrollbar">
            <ul></ul>
        </div> <!-- End of Left Column -->

        <!-- RIGHT COLUMN: New Entry Form -->
        <div class="new-entry-container">

            <!-- Form Header -->
            <div class="form-header">
                ✏️ New Entry
            </div>

            <!-- Form Inputs -->
            <form class="form-body">

                <!-- Title Input -->
                <!-- We use a standard text input here for the title -->
                <input type="text" class="input-field" id="title" placeholder="Title...">

                <!-- Date and Mood Row -->
                <!-- We group these two inputs in a flex container to sit side-by-side -->
                <div class="row-group">
                    <div class="input-field date-input">
                        <input type="date" id="date" />
                    </div>
                    <div class="input-field mood-input">
                        <select id="mood">
                            <option value="" disabled selected>Mood...</option>
                            <option value="happy">😁 Happy</option>
                            <option value="sad">😢 Sad</option>
                            <option value="angry">😡 Angry</option>
                            <option value="calm">😌 Calm</option>
                            <option value="anxious">😰 Anxious</option>
                            <option value="excited">🤩 Excited</option>
                            <option value="motivated">💪 Motivated</option>
                            <option value="tired">😴 Tired</option>
                            <option value="focused">🎯 Focused</option>
                            <option value="lonely">😔 Lonely</option>
                            <option value="grateful">🙏 Grateful</option>
                            <option value="confused">🤔 Confused</option>
                            <option value="other">📝 Other</option>
                        </select>
                    </div>
                </div>

                <!-- Tags Input -->
                <!-- We wrap the input to easily position the tag icon inside it -->
                <div class="tag-input-container">
                    <span class="tag-icon">🏷️</span>
                    <input type="text" id="tags" placeholder="tag1, tag2, ...">
                </div>

                <!-- Content Textarea -->
                <!-- A textarea is used for multi-line text input -->
                <textarea class="input-field hide-scrollbar" id="content" placeholder="Write your thoughts here..."></textarea>

                <!-- Form Action Buttons -->
                <!-- Buttons are grouped and aligned to the right -->
                <div class="form-actions">
                    <button type="button" id="cancel" class="btn btn-cancel">Cancel</button>
                    <button type="submit" id="save" class="btn btn-save">💾 Save</button>
                </div>

            </form> <!-- End of Form Body -->

        </div> <!-- End of Right Column -->

    </main> <!-- End of Main Container -->

    <footer>
        <!-- random thoghts come here from JS -->
        <div id="thought"></div> 
    </footer>
    </div>

</body>
<script src="app.js"></script>

</html>
